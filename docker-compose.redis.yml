services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: langgraph-redis
    ports:
      - "6379:6379"
    volumes:
      - langgraph_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  langgraph_redis_data:
